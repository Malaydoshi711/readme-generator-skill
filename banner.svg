<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#bc8cff"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#bc8cff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#58a6ff" stroke-width="0.5">
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="800" y1="0" x2="800" y2="300"/>
    <line x1="1000" y1="0" x2="1000" y2="300"/>
  </g>

  <!-- Glow effect -->
  <ellipse cx="600" cy="150" rx="500" ry="120" fill="url(#glow)"/>

  <!-- Document icon -->
  <g transform="translate(340, 85)">
    <!-- Page -->
    <rect x="0" y="0" width="52" height="65" rx="4" fill="none" stroke="url(#accent)" stroke-width="2.5"/>
    <!-- Folded corner -->
    <path d="M36 0 L52 16" stroke="url(#accent)" stroke-width="2.5" fill="none"/>
    <path d="M36 0 L36 16 L52 16" stroke="url(#accent)" stroke-width="2" fill="#161b22"/>
    <!-- Lines -->
    <line x1="10" y1="28" x2="42" y2="28" stroke="#58a6ff" stroke-width="2" opacity="0.7"/>
    <line x1="10" y1="37" x2="36" y2="37" stroke="#58a6ff" stroke-width="2" opacity="0.5"/>
    <line x1="10" y1="46" x2="40" y2="46" stroke="#58a6ff" stroke-width="2" opacity="0.3"/>
    <!-- Checkmark -->
    <circle cx="44" cy="57" r="12" fill="#238636" opacity="0.9"/>
    <polyline points="38,57 42,61 50,53" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Title -->
  <text x="420" y="125" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="url(#accent)">README Generator</text>

  <!-- Tagline -->
  <text x="420" y="165" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="20" fill="#8b949e">A Claude Skill for crafting publication-ready README files</text>

  <!-- Accent line -->
  <rect x="420" y="180" width="120" height="2" rx="1" fill="url(#accent)" opacity="0.6"/>

  <!-- Bottom tags -->
  <g transform="translate(420, 205)">
    <rect x="0" y="0" width="90" height="26" rx="13" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="45" y="17" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#58a6ff" text-anchor="middle">Claude Skill</text>

    <rect x="100" y="0" width="80" height="26" rx="13" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="140" y="17" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#bc8cff" text-anchor="middle">Markdown</text>

    <rect x="190" y="0" width="95" height="26" rx="13" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="237" y="17" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#7ee787" text-anchor="middle">Open Source</text>
  </g>
</svg>
